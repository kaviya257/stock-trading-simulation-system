<!DOCTYPE html>
<html lang="en">
<head>
    <title>Registration</title>
    <style>
        .stylish-btn{
           background: linear-gradient(to right,pink,blueviolet);
           color: whitesmoke;
           border: none;
           padding:12px 24px;
           margin:10px 0;
           border-radius: 30px;
           font-size: 16px;
           cursor: pointer;
           transition: all 0.3s ease;
           box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .stylish-btn:hover{
            background: linear-gradient(to right,pink,blueviolet);
            transform: scale(1.05);
        }
    </style>
</head>
<body  style="background-image: url('/static/newinvestorbg.jpg');background-size:cover;"></body>
<center>
    <h1 style="color: palevioletred;">Investor Registration</h1>
<form method="post" action="/investor/Register">
    <table>
            <tr>
                <td style="color: palevioletred">UserName</td>
                <td><input type="text" name="UserName" value="{{uname}}" readonly></td>
            </tr>
            <tr>
                <td style="color:palevioletred">PassWord</td>
                <td><input type="text" name="PassWord" value="{{pword}}" readonly></td>
            </tr>
             <tr>
                <td style="color: palevioletred">Balance</td>
                <td><input type="number" name="Balance" placeholder="enter Balance" required></td>
            </tr>
            <tr>
                <td><button onclick="window.location.href='/investor/Register'" class="stylish-btn">Refresh</button></td>
                <td><button type="submit" class="stylish-btn ">Register</button></td>
            </tr>
        </table>
        </form>
</center>        
    
</body>
</html>
