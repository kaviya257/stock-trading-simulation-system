<!DOCTYPE html>
<html lang="en">
<head>
    <title>Stock Remove</title>
    <style>
        .stylish-btn{
           background: linear-gradient(to right,pink,blueviolet);
           color: whitesmoke;
           border: none;
           padding:12px 24px;
           margin:10px 0;
           border-radius: 30px;
           font-size: 16px;
           cursor: pointer;
           transition: all 0.3s ease;
           box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .stylish-btn:hover{
            background: linear-gradient(to right,pink,blueviolet);
            transform: scale(1.05);
        }
    </style>
</head>
<body style="background-image: url('/static/loginbg.jpg'); background-size: cover;">
    <center>
    <h1 style="color: aliceblue;">Remove Stocks</h1>
    <form method="post" action="/deletestock">
    <table>
         <tr>
            <td style="color: whitesmoke;">stocksymbol</td>
            <td><input type="text" name="stocksymbol" placeholder="enter stock symbol" required></td>
        </tr>
        <tr>
            <td><button type="submit" class="stylish-btn">Submit</button></td>
        </tr>
    <center>
    
</body>
</html>
