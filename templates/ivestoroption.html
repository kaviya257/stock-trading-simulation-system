<!DOCTYPE html>
<html lang="en">
<head>
    <title>Investor</title>
    <link rel="icon" href="/static/ivestorimg.png">
    <style>
        .stylish-btn{
           background: linear-gradient(to right,rgb(60, 60, 229),blue);
           color: whitesmoke;
           border: none;
           padding:12px 24px;
           margin:10px 0;
           border-radius: 30px;
           font-size: 16px;
           font-weight: bold;
           text-decoration: none;
           cursor: pointer;
           transition: all 0.3s ease;
           box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .stylish-btn:hover{
            background: linear-gradient(to right,rgb(60, 60, 229),blue);
            transform: scale(1.05);
        }
    </style>
</head>
<body  style="background-image: url('/static/ivestorbg.jpg');background-size:cover;">
    <center>
         <h1 style="color: azure;text-decoration: wavy;text-shadow: 10cm;">Investor</h1>
         <img src="/static/ivestorimg.png" width="250" height="250">
        <div style="margin-top: 20px;">
            <a href="/investor/new" class="stylish-btn" style="display:block; width: 200px; margin: 10px auto;">New Investor</a>
            <a href="/investor/exist" class="stylish-btn" style="display: block;width: 200px;margin: 10px auto;">Existing Investor</a>
        </div>
    </center>
    
</body>
</html>
